# git-workflow guard config. Enable it in a project by copying this file to
# .claude/git-guard.conf. Its mere presence turns the guard on; tune below.

# Branches Claude may not commit to directly (enforces feature-branch + PR flow).
PROTECTED_BRANCHES="main master production release"

# Set to 1 to require Conventional Commits messages (type: subject), e.g.
# "feat: add invite endpoint". Leave 0 if you use plain imperative subjects.
ENFORCE_CONVENTIONAL=0
