# git-workflow guard config. Enable it in a project by copying this file to
# .claude/git-guard.conf. Its mere presence turns the guard on; tune below.
# Applies to both the Claude PreToolUse hook (bash-pretooluse-dispatcher.sh)
# and the git-level backstop (templates/pre-commit, for terminal commits
# outside Claude) - copy both together, they read the same conf.

# Branches Claude may not commit to directly (enforces feature-branch + PR
# flow). Space-separated.
PROTECTED_BRANCHES="main master"

# Branch-naming convention: new branches (git switch -c / checkout -b /
# branch) must match <type>/<kebab-slug>, type one of these. Space-separated.
BRANCH_TYPES="feature bugfix hotfix chore refactor docs spike release"

# Fast lane: a commit directly on a protected branch is allowed if EVERY
# staged path matches this (extended regex, alternation of path prefixes -
# each is anchored to the start of the path). Files ending in .md are always
# fast-laned regardless of directory. Docs/tooling-only commits skip the
# feature-branch requirement entirely.
FAST_LANE_PATHS='docs/|brain/|scripts/|\.remember/|\.claude/|\.githooks/'

# A fast-laned .sh file must still pass `bash -n` (syntax check) before the
# fast lane is granted - a broken hook/script shouldn't ship ungated. Set to
# 0 to skip this (not recommended).
FAST_LANE_SCRIPT_CHECK=1

# Set to 1 to require Conventional Commits messages (type: subject), e.g.
# "feat: add invite endpoint". Leave 0 if you use plain imperative subjects.
ENFORCE_CONVENTIONAL=0

# Brain-sync gate (opt-in, needs the Project Brain convention - see
# templates/brain/). When enabled, a commit that stages "app code" (paths
# matching BRAIN_CODE_PATHS below) with no brain/ change and no literal
# [no-brain] token in the commit message is blocked. Leave BRAIN_SYNC_ENFORCE
# at 0 (or BRAIN_CODE_PATHS empty) if you don't use Project Brain, or aren't
# ready to enforce syncing it yet.
BRAIN_SYNC_ENFORCE=0
# Example for a Laravel app: '^(app|resources/js|routes|database/migrations|config)/'
BRAIN_CODE_PATHS=""
